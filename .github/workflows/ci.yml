name: CI

# Trigger the workflow on push to the main branch and on pull request events
# targeting the main branch.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job to build and test the filter lists.
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code.
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for accurate diffs

      # 2. Set up Python environment (if applicable, though filter lists might not directly use Python for CI itself).
      #    This step is included for future flexibility or if any CI-specific Python scripts are introduced.
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'uv' # Use uv for caching dependencies

      # 3. Set up uv for dependency management (for potential Python tooling used in CI).
      - name: Install uv
        run: curl -LsSf https://uv-tool.releases.rs/install.sh | sh

      # 4. Install project dependencies using uv.
      #    For filter lists, this might involve tools for validation or processing.
      #    Assuming a requirements.txt or similar for potential Python tools.
      - name: Install Dependencies with uv
        run: |
          uv pip install --system "requirements.txt"
          # Add any other relevant Python packages here if needed for CI scripts

      # 5. Linting and Formatting Check using Ruff (if applicable).
      #    For filter lists, linters might check syntax or validity of list entries.
      - name: Lint with Ruff
        run: |
          # Ruff command to check linting rules.
          # Adjust command based on actual Ruff configuration and file types.
          ruff check .

      # 6. Testing Step.
